<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&display=swap" rel="stylesheet">
    <style>
      .clientra-preload {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #111111;
      }

      .clientra-preload__content {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .clientra-preload__mark {
        position: relative;
        width: 96px;
        height: 96px;
      }

      .clientra-preload__mark::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 2px solid #f4b7e5;
        border-top-color: #dc4fb2;
        border-right-color: #dc4fb2;
        border-radius: 999px;
        animation: clientra-preload-spin 950ms linear infinite;
      }

      .clientra-preload__mark img {
        position: absolute;
        inset: 16px;
        width: 64px;
        height: 64px;
        object-fit: contain;
      }

      .clientra-preload__text {
        margin-top: 16px;
        font-family: "Bruno Ace SC", sans-serif;
        font-size: 20px;
      }

      @keyframes clientra-preload-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <title>Clientra</title>
  </head>
  <body>
    <div id="root">
      <main class="clientra-preload" aria-label="Loading Clientra">
        <section class="clientra-preload__content">
          <span class="clientra-preload__mark" aria-hidden="true">
            <img src="./src/assets/CLIENTRA2.png" alt="" />
          </span>
          <p class="clientra-preload__text">Loading...</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
